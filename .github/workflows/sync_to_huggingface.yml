name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup identitas git
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 2. Extract folder backend ke branch temporary
          # Ini memastikan hanya isi folder backend yang dikirim ke HF
          git subtree split --prefix backend -b deploy
          
          # 3. Push ke Hugging Face (menggunakan x-token sebagai user)
          # Ganti Arlor dengan username HF Anda jika berbeda
          git push https://Arlor:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Arlor/seis deploy:main --force
